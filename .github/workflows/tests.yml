name: Restful Booker — API & UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * *'    # Runs daily at 08:00 UTC
  workflow_dispatch:        # Allows manual run from GitHub Actions tab

jobs:
  # ── JOB 1: API Tests (Task 2) ─────────────────────────────────────────────
  api-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run API tests
        env:
          BASE_URL:        https://restful-booker.herokuapp.com
          BOOKER_USERNAME: admin
          BOOKER_PASSWORD: password123
        run: npm run test:api

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-playwright-html-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-report
          path: allure-report/
          retention-days: 30

  # ── JOB 2: UI Tests (Task 3) ──────────────────────────────────────────────
  ui-tests:
    name: UI End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run UI tests
        env:
          UI_BASE_URL: https://www.medirect.com.mt
        run: npm run test:ui

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-playwright-html-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-failure-screenshots
          path: test-results/
          retention-days: 7

# ── JOB 3: Publish Allure Report to GitHub Pages ──────────────────────────
  publish-allure:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests]
    if: always()
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download API Allure report
        uses: actions/download-artifact@v4
        with:
          name: api-allure-report
          path: public/api

      - name: Download UI Allure report
        uses: actions/download-artifact@v4
        with:
          name: ui-allure-report
          path: public/ui

      - name: Create index page linking both reports
        run: |
          cat > public/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><title>Test Reports</title>
          <style>
            body { font-family: Arial, sans-serif; max-width: 600px; margin: 80px auto; text-align: center; }
            a { display: block; margin: 20px; padding: 20px; background: #4CAF50; color: white;
                text-decoration: none; border-radius: 8px; font-size: 18px; }
            a:hover { background: #45a049; }
          </style>
          </head>
          <body>
            <h1>Restful Booker — Test Reports</h1>
            <a href="api/index.html">API Integration Tests — Allure Report</a>
            <a href="ui/index.html">UI End-to-End Tests — Allure Report</a>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public